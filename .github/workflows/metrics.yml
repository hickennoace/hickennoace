# Renders a stats SVG (github-metrics.svg) and commits it to this repo, so the
# "GitHub at a glance" image on the profile ALWAYS loads (no third-party
# rendering at view time). Powered by lowlighter/metrics.
#
# Zero setup: it uses the built-in GITHUB_TOKEN, so no personal token/secret is
# required. (Stats are based on public activity.) It runs on every push to this
# file, daily on a schedule, and can be run manually from the Actions tab.
name: Metrics

on:
  schedule: [{ cron: "0 6 * * *" }]
  workflow_dispatch:
  push: { branches: ["main"], paths: [".github/workflows/metrics.yml"] }

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: hickennoace
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Jerusalem
          # Don't abort the whole render if a single plugin can't fetch data
          plugins_errors_fatal: no
          base: header, activity, repositories, metadata

          # Most-used languages across public repositories
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_sections: most-used
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage

          # Isometric commit calendar (the eye-catching 3D one)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # When I tend to be active
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
